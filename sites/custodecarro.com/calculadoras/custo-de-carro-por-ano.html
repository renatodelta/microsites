  <meta name='description' content='Calculadora de custo de carro por ano: Resumo anual de despesas.' />

  <link rel='icon' type='image/svg+xml' href='../assets/favicon.svg' />
  <!-- Parallel CSS loading -->
  <link rel='preload' href='../css/base.css' as='style' />
  <link rel='stylesheet' href='../css/base.css' />

<body>
  <header><div class='container topbar'><a class='brand' href='../index.html'><img class="brand-logo" src="../assets/logo.svg" alt="Custo de Carro" width="250" height="58" /></a><nav><a href='./index.html'>Calculadoras</a><a href='../artigos/index.html'>Artigos</a><a href='../politica-de-privacidade.html'>Política de Privacidade</a><a href='../contato.html'>Contato</a><a href='../sobre.html'>Sobre</a></nav></div></header>
  <main class='container hero'>
    <h1>Calculadora de custo de carro por ano</h1>
    <section class='card'>
      <form class='tool-form' id='calcForm' data-calc='custo-por-ano'>
        <div class='field'>
          <label for='precoCarro'>Valor do veículo (R$)</label>
          <input type='number' step='0.01' min='0' id='precoCarro' name='precoCarro' required />
        </div>
        <div class='field'>
          <label for='anos'>Anos de uso</label>
          <input type='number' step='1' min='1' id='anos' name='anos' required />
        </div>
        <button class='btn' type='submit'>Calcular por ano</button>
      </form>
      <p class='result' id='resultado' aria-live='polite'></p>
    </section>
  </main>
  <footer class='site-footer'><div class='container site-footer__inner'><p class='site-footer__copy'>© 2026 Custo de Carro - Todos os direitos reservados.</p><p class='site-footer__links'><a href='../sobre.html'>Sobre</a><span>|</span><a href='../contato.html'>Contato</a><span>|</span><a href='../politica-de-privacidade.html'>Política de Privacidade</a></p></div></footer>
