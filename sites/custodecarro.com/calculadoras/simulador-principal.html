<!doctype html>
<html lang='pt-BR'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Simulador principal de custo do carro | Custo de Carro</title>
  <meta name='description' content='Simulador principal de custo do carro: Estimativa mensal, anual e por km.' />
  <meta name='robots' content='index,follow,max-image-preview:large' />
  <link rel='canonical' href='https://custodecarro.com/calculadoras/simulador-principal' />
  <meta name='adsense-client' content='ca-pub-0000000000000000' />
  <link rel='icon' type='image/svg+xml' href='../assets/favicon.svg' />
  <link rel='stylesheet' href='../css/theme.css' />
  <script defer src='../js/calculadoras-carro.js'></script>
  <script defer src='../js/compliance.js'></script>
</head>
<body>
  <header><div class='container topbar'><a class='brand' href='../index.html'><img class='brand-logo' src='../assets/logo.svg' alt='Custo de Carro' /></a><nav><a href='./index.html'>Calculadoras</a><a href='../artigos/index.html'>Artigos</a><a href='../politica-de-privacidade.html'>Política de Privacidade</a><a href='../contato.html'>Contato</a><a href='../sobre.html'>Sobre</a></nav></div></header>
  <main class='container hero'>
    <h1>Simulador principal de custo do carro</h1>
    <section class='card'>
      <form class='tool-form' id='calcForm' data-calc='custo-mensal'>
        <div class='field'>
          <label for='precoCarro'>Valor do veículo (R$)</label>
          <input type='number' step='0.01' min='0' id='precoCarro' name='precoCarro' required />
        </div>
        <div class='field'>
          <label for='kmMes'>Quilometragem por mês (km)</label>
          <input type='number' step='1' min='0' id='kmMes' name='kmMes' required />
        </div>
        <div class='field'>
          <label for='consumo'>Consumo do carro (km/l)</label>
          <input type='number' step='0.1' min='0.1' id='consumo' name='consumo' required />
        </div>
        <div class='field'>
          <label for='precoCombustivel'>Preço do combustível (R$)</label>
          <input type='number' step='0.01' min='0' id='precoCombustivel' name='precoCombustivel' required />
        </div>
        <div class='field'>
          <label for='seguroMensal'>Seguro mensal (R$)</label>
          <input type='number' step='0.01' min='0' id='seguroMensal' name='seguroMensal' />
        </div>
        <div class='field'>
          <label for='manutencaoMensal'>Manutenção mensal (R$)</label>
          <input type='number' step='0.01' min='0' id='manutencaoMensal' name='manutencaoMensal' />
        </div>
        <div class='field'>
          <label for='ipvaAnual'>IPVA anual (R$)</label>
          <input type='number' step='0.01' min='0' id='ipvaAnual' name='ipvaAnual' />
        </div>
        <button class='btn' type='submit'>Calcular custo</button>
      </form>
      <p class='result' id='resultado' aria-live='polite'></p>
    </section>
  </main>
  <footer class='site-footer'><div class='container site-footer__inner'><p class='site-footer__copy'>© 2026 Custo de Carro - Todos os direitos reservados.</p><p class='site-footer__links'><a href='../sobre.html'>Sobre</a><span>|</span><a href='../contato.html'>Contato</a><span>|</span><a href='../politica-de-privacidade.html'>Política de Privacidade</a></p></div></footer>
</body>
</html>
