<body>
  <header><div class='container topbar'><a class='brand' href='../index.html'><img class='brand-logo' src='../assets/logo.svg' alt='Custo de Carro' /></a><nav><a href='./index.html'>Calculadoras</a><a href='../artigos/index.html'>Artigos</a><a href='../politica-de-privacidade.html'>Política de Privacidade</a><a href='../contato.html'>Contato</a><a href='../sobre.html'>Sobre</a></nav></div></header>
  <main class='container hero'>
    <h1>Calculadora de custo anual do carro</h1>
    <section class='card'>
      <form class='tool-form' id='calcForm' data-calc='custo-anual'>
        <div class='field'>
          <label for='combustivel'>Combustível anual (R$)</label>
          <input type='number' step='0.01' min='0' id='combustivel' name='combustivel' required />
        </div>
        <div class='field'>
          <label for='seguro'>Seguro anual (R$)</label>
          <input type='number' step='0.01' min='0' id='seguro' name='seguro' />
        </div>
        <div class='field'>
          <label for='manutencao'>Manutenção anual (R$)</label>
          <input type='number' step='0.01' min='0' id='manutencao' name='manutencao' />
        </div>
        <div class='field'>
          <label for='ipva'>IPVA anual (R$)</label>
          <input type='number' step='0.01' min='0' id='ipva' name='ipva' />
        </div>
        <button class='btn' type='submit'>Calcular custo anual</button>
      </form>
      <p class='result' id='resultado' aria-live='polite'></p>
    </section>
  </main>
