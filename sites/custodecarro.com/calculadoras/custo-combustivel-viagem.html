<!doctype html>
<html lang='pt-BR'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Calculadora de combustível para viagem | Custo de Carro</title>
  <meta name='description' content='Calculadora de combustível para viagem: Litros e valor estimado.' />
  <meta name='robots' content='index,follow,max-image-preview:large' />
  <link rel='canonical' href='https://custodecarro.com/calculadoras/custo-combustivel-viagem' />
  <meta name='adsense-client' content='ca-pub-0000000000000000' />
  <link rel='icon' type='image/svg+xml' href='../assets/favicon.svg' />
  <!-- Parallel CSS loading -->
  <link rel='preload' href='../css/base.css' as='style' />
  <link rel='stylesheet' href='../css/base.css' />
  <link rel='stylesheet' href='../css/compliance.css' />
  <link rel='stylesheet' href='../css/theme.css' />
  <script defer src='../js/calculadoras-carro.js'></script>
  <script defer src='../js/compliance.js'></script>
</head>
<body>
  <header><div class='container topbar'><a class='brand' href='../'><img class="brand-logo" src="../assets/logo.svg" alt="Custo de Carro" width="250" height="58" /></a><nav><a href='./'>Calculadoras</a><a href='../artigos/'>Artigos</a><a href='../politica-de-privacidade'>Política de Privacidade</a><a href='../contato'>Contato</a><a href='../sobre'>Sobre</a></nav></div></header>
  <main class='container hero'>
    <h1>Calculadora de combustível para viagem</h1>
    <section class='card'>
      <form class='tool-form' id='calcForm' data-calc='combustivel-viagem'>
        <div class='field'>
          <label for='distancia'>Distância da viagem (km)</label>
          <input type='number' step='1' min='1' id='distancia' name='distancia' required />
        </div>
        <div class='field'>
          <label for='consumo'>Consumo do carro (km/l)</label>
          <input type='number' step='0.1' min='0.1' id='consumo' name='consumo' required />
        </div>
        <div class='field'>
          <label for='precoCombustivel'>Preço do combustível (R$)</label>
          <input type='number' step='0.01' min='0' id='precoCombustivel' name='precoCombustivel' required />
        </div>
        <button class='btn' type='submit'>Calcular combustível</button>
      </form>
      <p class='result' id='resultado' aria-live='polite'></p>
    </section>
  </main>
  <footer class='site-footer'><div class='container site-footer__inner'><p class='site-footer__copy'>© 2026 Custo de Carro - Todos os direitos reservados.</p><p class='site-footer__links'><a href='../sobre'>Sobre</a><span>|</span><a href='../contato'>Contato</a><span>|</span><a href='../politica-de-privacidade'>Política de Privacidade</a></p></div></footer>
</body>
</html>
