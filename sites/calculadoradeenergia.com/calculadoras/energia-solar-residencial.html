<!doctype html>
<html lang='pt-BR'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Calculadora de Energia Solar Residencial - Calculadora de Energia</title>
  <meta name='description' content='Estime tamanho do sistema solar, investimento e payback residencial.' />
  <meta name='adsense-client' content='ca-pub-0000000000000000' />
  <link rel='icon' type='image/svg+xml' href='../assets/favicon.svg' />
  <link rel='stylesheet' href='../css/theme.css' />
  <script defer src='../js/compliance.js'></script>
  <script defer src='../js/energia-solar-residencial.js'></script>
</head>
<body>
  <header>
    <div class='container topbar'>
      <a class='brand' href='../index.html'>
        <img class='brand-logo' src='../assets/logo.svg' alt='Calculadora de Energia' />
      </a>
      <nav>
        <a href='./index.html'>Calculadoras</a>
        <a href='../artigos/index.html'>Artigos</a>
        <a href='../sobre.html'>Sobre</a>
        <a href='../politica-de-privacidade.html'>Política de Privacidade</a>
        <a href='../contato.html'>Contato</a>
      </nav>
    </div>
  </header>

  <main class='container hero'>
    <h1>Calculadora de energia solar residencial</h1>
    <section class='card'>
      <div class='field'>
        <label for='consumoMensal'>Consumo mensal da residência (kWh)</label>
        <input id='consumoMensal' type='number' step='0.01' min='0' />
      </div>
      <div class='field'>
        <label for='tarifa'>Tarifa média de energia (R$/kWh)</label>
        <input id='tarifa' type='number' step='0.01' min='0' />
      </div>
      <div class='field'>
        <label for='fatorProducao'>Produção média (kWh por kWp/mês)</label>
        <input id='fatorProducao' type='number' step='0.1' min='0' value='120' />
      </div>
      <div class='field'>
        <label for='custoKwp'>Custo instalado (R$ por kWp)</label>
        <input id='custoKwp' type='number' step='0.01' min='0' value='4500' />
      </div>
      <button class='btn' id='calcularBtn'>Calcular sistema solar</button>
      <p class='result' id='resultado'></p>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='container site-footer__inner'>
      <p class='site-footer__copy'>© 2026 Calculadora de Energia - Todos os direitos reservados.</p>
      <p class='site-footer__links'>
        <a href='../sobre.html'>Sobre</a>
        <span>|</span>
        <a href='../contato.html'>Contato</a>
        <span>|</span>
        <a href='../politica-de-privacidade.html'>Política de Privacidade</a>
      </p>
    </div>
  </footer>
</body>
</html>
