  <main class='container hero'>
    <h1>Simulador de economia com LED</h1>
    <section class='card'>
      <div class='field'>
        <label for='qtdLampadas'>Quantidade de lâmpadas</label>
        <input id='qtdLampadas' type='number' step='1' min='0' value='10' />
      </div>
      <div class='field'>
        <label for='potenciaAntiga'>Potência da lâmpada atual (W)</label>
        <input id='potenciaAntiga' type='number' step='1' min='0' value='60' />
      </div>
      <div class='field'>
        <label for='potenciaLed'>Potência da nova LED (W)</label>
        <input id='potenciaLed' type='number' step='1' min='0' value='9' />
      </div>
      <div class='field'>
        <label for='horasDia'>Horas de uso por dia</label>
        <input id='horasDia' type='number' step='0.1' min='0' value='5' />
      </div>
      <div class='field'>
        <label for='diasMes'>Dias de uso no mês</label>
        <input id='diasMes' type='number' step='1' min='0' value='30' />
      </div>
      <div class='field'>
        <label for='tarifa'>Tarifa (R$/kWh)</label>
        <input id='tarifa' type='number' step='0.01' min='0' value='0.80' />
      </div>
      <button class='btn' id='calcularBtn'>Simular economia</button>
      <p class='result' id='resultado'></p>
      <p><small><b>Observação:</b> esta simulação não considera a bandeira tarifária (Verde, Amarela ou Vermelha).</small></p>
    </section>
  </main>
