<!doctype html>
<html lang='pt-BR'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Simulador Principal - Simulador Conta de Luz</title>
  <meta name='description' content='Simulador principal do Simulador Conta de Luz' />
  <meta name='adsense-client' content='ca-pub-0000000000000000' />
  <link rel='icon' type='image/svg+xml' href='../assets/favicon.svg' />
  <link rel='stylesheet' href='../css/theme.css' />
  <script defer src='../js/compliance.js'></script>
  <script defer src='../js/calculadora.js'></script>
</head>
<body>
  <header>
    <div class='container topbar'>
      <a class='brand' href='../index.html'>
        <img class='brand-logo' src='../assets/logo.svg' alt='Simulador Conta de Luz' />
      </a>
      <nav>
        <a href='./index.html'>Calculadoras</a>
        <a href='../artigos/index.html'>Artigos</a>
        <a href='../sobre.html'>Sobre</a>
        <a href='../politica-de-privacidade.html'>Política de Privacidade</a>
        <a href='../contato.html'>Contato</a>
      </nav>
    </div>
  </header>

  <main class='container hero'>
    <h1>Simulador Principal</h1>
    <section class='card'>
      <div class='field'>
        <label for='valor1'>Valor 1</label>
        <input id='valor1' type='number' step='0.01' min='0' />
      </div>
      <div class='field'>
        <label for='valor2'>Valor 2</label>
        <input id='valor2' type='number' step='0.01' min='0' />
      </div>
      <button class='btn' id='calcularBtn'>Calcular</button>
      <p class='result' id='resultado'></p>
    </section>
  </main>

  <footer class='site-footer'>
    <div class='container site-footer__inner'>
      <p class='site-footer__copy'>© 2026 Simulador Conta de Luz - Todos os direitos reservados.</p>
      <p class='site-footer__links'>
        <a href='../sobre.html'>Sobre</a>
        <span>|</span>
        <a href='../contato.html'>Contato</a>
        <span>|</span>
        <a href='../politica-de-privacidade.html'>Política de Privacidade</a>
      </p>
    </div>
  </footer>
</body>
</html>
