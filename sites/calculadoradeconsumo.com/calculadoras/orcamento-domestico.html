<!doctype html>
<html lang='pt-BR'>
<head>
  <meta charset='utf-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1' />
  <title>Calculadora de Orçamento Doméstico</title>
  <meta name='description' content='Some despesas mensais e compare com sua renda para ver saldo.' />
   <meta name='adsense-client' content='ca-pub-0000000000000000' />
  <link rel='icon' type='image/svg+xml' href='../assets/favicon.svg' />
  <link rel='stylesheet' href='../css/theme.css' />
   <script defer src='../js/compliance.js'></script>
  <script defer src='../js/orcamento-domestico.js'></script>
</head>
<body>
  <header>
    <div class='container topbar'>
      <a class='brand' href='../index.html'>
        <img class='brand-logo' src='../assets/logo.svg' alt='Calculadora de Consumo' />
      </a>
      <nav>
        <a href='./index.html'>Calculadoras</a>
        <a href='../artigos/index.html'>Artigos</a>
        <a href='../sobre.html'>Sobre</a>
        <a href='../politica-de-privacidade.html'>Política de Privacidade</a>
        <a href='../contato.html'>Contato</a>
      </nav>
    </div>
  </header>

  <main class='container hero'>
    <h1>Calculadora de Orcamento Domestico</h1>
    <p>Calcule despesas fixas e variaveis para acompanhar seu saldo mensal.</p>

    <section class='card'>
      <div class='field'>
        <label for='renda'>Renda mensal (R$)</label>
        <input id='renda' type='number' min='0' step='0.01' />
      </div>
      <div class='field'>
        <label for='moradia'>Moradia (R$)</label>
        <input id='moradia' type='number' min='0' step='0.01' />
      </div>
      <div class='field'>
        <label for='alimentacao'>Alimentacao (R$)</label>
        <input id='alimentacao' type='number' min='0' step='0.01' />
      </div>
      <div class='field'>
        <label for='transporte'>Transporte (R$)</label>
        <input id='transporte' type='number' min='0' step='0.01' />
      </div>
      <div class='field'>
        <label for='outros'>Outros (R$)</label>
        <input id='outros' type='number' min='0' step='0.01' />
      </div>
      <button class='btn' id='calcularBtn'>Calcular</button>
      <p class='result' id='resultado'></p>
    </section>
  </main>
  <footer class='site-footer'>
    <div class='container site-footer__inner'>
      <p class='site-footer__copy'>© 2026 Calculadora de Consumo - Todos os direitos reservados.</p>
      <p class='site-footer__links'>
        <a href='../sobre.html'>Sobre</a>
        <span>|</span>
        <a href='../contato.html'>Contato</a>
        <span>|</span>
        <a href='../politica-de-privacidade.html'>Política de Privacidade</a>
      </p>
    </div>
  </footer>
</body>
</html>
